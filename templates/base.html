<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Interactive Teaching Platform{% endblock %} - Dynamic Learning</title>
    <meta name="description" content="{% block meta_description %}Dynamic learning and multimedia platform.{% endblock %}">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Boxicons (for modern icons) -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ STATIC_URL }}css/main.css">
    
    {% block extra_head %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    {% include 'partials/nav.html' %}

    <main class="flex-grow-1">
        {% block content %}
        {% endblock %}
    </main>

    {% include 'partials/footer.html' %}

    {% include 'partials/media_modal.html' %}
    {% include 'partials/term_modal.html' %}

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="{{ STATIC_URL }}js/media_modal.js"></script>
    <script src="{{ STATIC_URL }}js/term_modal.js"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
